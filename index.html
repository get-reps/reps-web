<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REPS</title>
    <meta
      name="description"
      content="You forget most of what you take in. We're fixing that."
    />
    <!-- No custom fonts — product voice uses system sans (see DESIGN_DECISIONS.md typography zone rules) -->
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
    ></script>
    <script
      type="text/javascript"
      src="https://app.viral-loops.com/widgetsV2/core/loader.js"
      data-campaign-id="vcJ0wn1o0gb91J3rZcU2akRQAs0"
      id="viral-loops-loader"
    ></script>
    <style type="text/tailwindcss">
      @theme inline {
        --color-cream: #fffaf7;
        --color-cream-dark: #fff0ea;
        --color-coral: #ff6b6b;
        --color-peach: #ff8e53;
        --color-charcoal: #2a2320;
        --color-muted: #6b5e57;
        --color-border: #ede8e3;
        --color-card: #ffffff;

        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      :root {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Viral Loops form overrides */
      form-widget {
        --vl-primary-color: #ff6b6b !important;
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .animate-fade-up {
        animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
      }

      .animate-fade-in {
        animation: fade-in 0.6s ease forwards;
        opacity: 0;
      }

      .delay-100 {
        animation-delay: 100ms;
      }
      .delay-200 {
        animation-delay: 200ms;
      }
      .delay-400 {
        animation-delay: 400ms;
      }
      .delay-600 {
        animation-delay: 600ms;
      }
      .delay-800 {
        animation-delay: 800ms;
      }
      .delay-1000 {
        animation-delay: 1000ms;
      }
      .delay-1200 {
        animation-delay: 1200ms;
      }

      .motto-word {
        display: inline-block;
      }

      .motto-dot {
        display: inline-block;
        color: var(--color-coral);
      }

      /* Subtle gradient text for the motto */
      .motto-gradient {
        background: linear-gradient(
          135deg,
          var(--color-charcoal) 0%,
          var(--color-muted) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Divider line with coral accent */
      .coral-line {
        width: 48px;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--color-coral),
          var(--color-peach)
        );
        border-radius: 2px;
      }
    </style>
  </head>
  <body class="bg-cream text-charcoal min-h-screen flex flex-col">
    <!-- HEADER -->
    <header
      class="flex items-center justify-between px-6 py-5 sticky top-0 z-50 bg-cream/90 backdrop-blur-md"
    >
      <div
        class="font-sans font-bold text-xl tracking-tight text-charcoal"
      >
        REPS
      </div>
      <div
        class="bg-card/60 backdrop-blur-sm border border-border px-3 py-1.5 rounded-full text-[11px] font-semibold text-coral uppercase tracking-widest"
      >
        Coming Soon
      </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col items-center justify-center px-6 pb-16">
      <div
        class="flex flex-col items-center text-center max-w-lg mx-auto"
      >
        <!-- THE MOTTO -->
        <h1
          class="font-sans font-bold text-5xl sm:text-6xl md:text-7xl tracking-tight leading-[1.1] mb-8"
        >
          <span class="motto-word animate-fade-up">Save</span
          ><span class="motto-dot animate-fade-up delay-100">.</span>
          <span class="motto-word animate-fade-up delay-200">Play</span
          ><span class="motto-dot animate-fade-up delay-200">.</span>
          <br />
          <span class="motto-word animate-fade-up delay-400"
            >Remember</span
          ><span class="motto-dot animate-fade-up delay-400">.</span>
        </h1>

        <!-- DIVIDER -->
        <div class="coral-line mx-auto mb-8 animate-fade-in delay-600"></div>

        <!-- TAGLINE -->
        <p
          class="text-muted text-lg sm:text-xl leading-relaxed max-w-sm mx-auto mb-10 animate-fade-up delay-800"
        >
          You forget most of what you take in.
          <br class="hidden sm:block" />
          We're fixing that.
        </p>

        <!-- WAITLIST -->
        <div
          class="w-full max-w-[400px] animate-fade-up delay-1000"
        >
          <form-widget
            ucid="vcJ0wn1o0gb91J3rZcU2akRQAs0"
          ></form-widget>
        </div>

        <!-- BLOOM SCROLLING -->
        <p
          class="text-muted text-base sm:text-lg mt-10 tracking-wide animate-fade-up delay-1200"
        >
          Stop doom scrolling. <span class="text-coral font-semibold">Start bloom scrolling.</span>
        </p>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-8 px-6 border-t border-border">
      <div class="flex flex-col items-center text-center gap-4">
        <div class="text-sm text-muted">
          Made with <span class="mx-0.5">&#129504;</span> in London
        </div>
        <div class="flex items-center gap-6 text-xs text-muted/60">
          <a href="/privacy" class="hover:text-coral transition-colors"
            >Privacy</a
          >
          <a href="/terms" class="hover:text-coral transition-colors"
            >Terms</a
          >
          <a
            href="mailto:support@getreps.io"
            class="hover:text-coral transition-colors"
            >Support</a
          >
        </div>
        <div class="text-[11px] text-muted/40">&copy; 2026 REPS</div>
      </div>
    </footer>
  </body>
</html>
